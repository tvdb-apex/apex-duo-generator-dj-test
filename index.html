const supabaseClient = createClient(PROJECT_URL, PUBLISHABLE_KEY);

// =========================
// SOUND FILES
// =========================
let soundEnabled = true;

const sounds = {
  bg: new Audio("assets/sounds/background.mp3?v=2"),
  click: new Audio("assets/sounds/ui-sound.mp3?v=2"),
  whoosh: new Audio("assets/sounds/woosh.mp3?v=2"),
  explosion: new Audio("assets/sounds/explosion.mp3?v=2")
};

sounds.bg.loop = true;
sounds.bg.volume = 0.2;

// =========================
// SOUND FUNCTIONS
// =========================
function playRollTick() {
  if (!soundEnabled) return;
  sounds.click.currentTime = 0;
  sounds.click.play().catch(()=>{});
}

function playRevealHit() {
  if (!soundEnabled) return;
  sounds.whoosh.currentTime = 0;
  sounds.whoosh.play().catch(()=>{});
}

function playChaosExplosion() {
  if (!soundEnabled) return;
  sounds.explosion.currentTime = 0;
  sounds.explosion.play().catch(()=>{});
}

// start background music after user interaction
document.body.addEventListener("click", () => {
  if (soundEnabled) {
    sounds.bg.play().catch(() => {});
  }
}, { once: true });

window.playRollTick = playRollTick;
window.playRevealHit = playRevealHit;
window.playChaosExplosion = playChaosExplosion;

</script>

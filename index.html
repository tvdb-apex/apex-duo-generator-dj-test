<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apex Duo Challenge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#070a0f;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

button{
padding:12px 22px;
border-radius:10px;
border:none;
background:#ff6a2b;
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:30px;
}

.card{
background:#0e1521;
padding:25px;
border-radius:20px;
position:relative;
overflow:hidden;
}

.legend{
font-size:44px;
font-weight:bold;
margin-bottom:10px;
}

.weapon{
margin-top:10px;
display:flex;
align-items:center;
gap:12px;
background:#121a28;
padding:8px;
border-radius:12px;
}

.weapon img{
height:40px;
}

.legendImage{
position:absolute;
right:0;
bottom:0;
height:320px;
opacity:0.9;
filter:drop-shadow(0 0 40px rgba(255,120,40,.5));
transition:.25s;
}

.glow{
animation:glowPulse 1.5s infinite alternate;
}

@keyframes glowPulse{
from{filter:drop-shadow(0 0 10px #ff6a2b);}
to{filter:drop-shadow(0 0 45px #ff6a2b);}
}

.slide{
animation:slide .5s ease;
}

@keyframes slide{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

</style>
</head>


<body>

<h1>Apex Duo Challenge</h1>

<button onclick="roll()">ROLL</button>

<div class="grid">

<div id="p1" class="card">
<div class="legend" id="p1legend">Waiting...</div>
<div id="p1weapons"></div>
<img id="p1img" class="legendImage">
</div>

<div class="legend" id="p2legend">Waiting...</div>
<div id="p2weapons"></div>

function random(a){
return a[Math.floor(Math.random()*a.length)]
}


function playSound(){

const ctx=new(window.AudioContext||window.webkitAudioContext)()

const osc=ctx.createOscillator()

osc.type="square"

osc.frequency.value=600

osc.connect(ctx.destination)

osc.start()

osc.stop(ctx.currentTime+.1)

}



function renderWeapons(el,list){

el.innerHTML=""

list.forEach(w=>{

const div=document.createElement("div")

div.className="weapon slide"

div.innerHTML=`<img src="assets/weapons/${weaponImages[w]}">${w}`

el.appendChild(div)

})

}



function roll(){

playSound()

const p1legend=random(legends)

const p2legend=random(legends)

const p1guns=[random(weapons),random(weapons)]

const p2guns=[random(weapons),random(weapons)]


document.getElementById("p1legend").innerText=p1legend
document.getElementById("p2legend").innerText=p2legend


renderWeapons(document.getElementById("p1weapons"),p1guns)
renderWeapons(document.getElementById("p2weapons"),p2guns)


const p1img=document.getElementById("p1img")
const p2img=document.getElementById("p2img")

p1img.src="assets/legends/"+legendImages[p1legend]
p2img.src="assets/legends/"+legendImages[p2legend]


p1img.classList.add("glow")
p2img.classList.add("glow")

}
